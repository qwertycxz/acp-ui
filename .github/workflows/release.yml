name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.2.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release?'
        required: false
        type: boolean
        default: false
      skip_version_update:
        description: 'Skip version update (use when re-running after failed build)'
        required: false
        type: boolean
        default: false
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # Update version in all config files (only for workflow_dispatch)
  update-version:
    if: github.event_name == 'workflow_dispatch' && !inputs.skip_version_update
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Update version in package.json
        run: npm version ${{ inputs.version }} --no-git-tag-version

      - name: Update version in tauri.conf.json
        run: |
          jq '.version = "${{ inputs.version }}"' src-tauri/tauri.conf.json > tmp.json
          mv tmp.json src-tauri/tauri.conf.json

      - name: Update version in Cargo.toml
        run: |
          sed -i 's/^version = ".*"/version = "${{ inputs.version }}"/' src-tauri/Cargo.toml

      - name: Commit and push version changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "chore: release v${{ inputs.version }}"
          git push

      - name: Create and push tag
        run: |
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Output version
        id: version
        run: echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT

  # Get version from tag (for tag push trigger)
  get-version:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

  # Build for all platforms
  build:
    needs: [update-version, get-version]
    if: always() && (needs.update-version.result == 'success' || needs.get-version.result == 'success' || needs.update-version.result == 'skipped')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            name: 'macOS-ARM64'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            name: 'macOS-x64'
          - platform: 'ubuntu-22.04'
            args: ''
            name: 'Linux-x64'
          - platform: 'ubuntu-22.04-arm'
            args: ''
            name: 'Linux-ARM64'
          - platform: 'windows-latest'
            args: ''
            name: 'Windows-x64'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies (Ubuntu only)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ needs.update-version.outputs.version || needs.get-version.outputs.version || inputs.version }}
          releaseName: 'ACP UI v${{ needs.update-version.outputs.version || needs.get-version.outputs.version || inputs.version }}'
          releaseBody: |
            ## What's New

            See the assets below to download ACP UI for your platform.

            ### Downloads
            - **Windows**: `.msi` (installer) or `.exe` (NSIS)
            - **macOS**: `.dmg` (Intel or Apple Silicon)
            - **Linux x64**: `.deb`, `.rpm`, or `.AppImage`
            - **Linux ARM64**: `.deb`, `.rpm`, or `.AppImage`
            - **Android**: `.apk` (sideload via "Install unknown apps")
          releaseDraft: true
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          args: ${{ matrix.args }}

  # Build the Android APK and upload it to the same draft release.
  # Runs after the desktop matrix so the release already exists when we
  # call `gh release upload`. The Android project (src-tauri/gen/android/)
  # is gitignored, so we (re-)initialise it on every run and re-apply the
  # AndroidManifest cleartext-traffic patch needed for ws:// LAN agents.
  build-android:
    needs: [build, update-version, get-version]
    if: always() && needs.build.result == 'success'
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref }}

      - name: Resolve version
        id: version
        run: |
          VERSION="${{ needs.update-version.outputs.version || needs.get-version.outputs.version || inputs.version }}"
          if [ -z "$VERSION" ]; then VERSION="${GITHUB_REF#refs/tags/v}"; fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125'

      - name: Set NDK_HOME
        run: echo "NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Install Rust stable with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache (Android)
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: 'android'

      - name: Install frontend dependencies
        run: npm ci

      - name: Initialise Android project
        run: |
          # `src-tauri/gen/android/` is gitignored; init regenerates it.
          npm run tauri android init

      - name: Allow cleartext traffic for ws:// LAN agents
        run: |
          # The init template wires the `usesCleartextTraffic` manifest
          # placeholder via Gradle. Force it to `true` directly in the
          # manifest so plain ws:// agents on local networks work without
          # users having to fiddle with build flags.
          MANIFEST=src-tauri/gen/android/app/src/main/AndroidManifest.xml
          sed -i 's|android:usesCleartextTraffic="\${usesCleartextTraffic}"|android:usesCleartextTraffic="true"|' "$MANIFEST"
          grep -q 'android:usesCleartextTraffic="true"' "$MANIFEST"

      - name: Build APK (debug-signed, sideloadable)
        # Debug builds are signed with the Android debug keystore so they
        # install without a release-keystore setup. Sufficient for sideload
        # distribution; Play Store would require a release keystore.
        run: npm run tauri android build -- --debug --apk true

      - name: Stage APK with versioned name
        id: apk
        run: |
          SRC=src-tauri/gen/android/app/build/outputs/apk/universal/debug/app-universal-debug.apk
          DEST="acp-ui_${{ steps.version.outputs.version }}_android.apk"
          cp "$SRC" "$DEST"
          echo "path=$DEST" >> $GITHUB_OUTPUT

      - name: Upload APK to draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ steps.version.outputs.version }}" \
            "${{ steps.apk.outputs.path }}" --clobber

  # Publish the release after all builds complete
  publish:
    needs: [build, build-android, update-version, get-version]
    if: always() && needs.build.result == 'success' && needs.build-android.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get release info
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.update-version.outputs.version || needs.get-version.outputs.version || inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Get the release ID
          RELEASE_ID=$(gh release view "v$VERSION" --json id -q '.id' 2>/dev/null || echo "")
          echo "release_id=$RELEASE_ID" >> $GITHUB_OUTPUT

      - name: Publish release
        if: steps.release.outputs.release_id != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "v${{ steps.release.outputs.version }}" --draft=false
